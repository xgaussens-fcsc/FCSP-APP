<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FCSC · Ensemble, soulevons nos montagnes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ciel:#4FAEE0;--ciel-vif:#63C0EE;--ciel-clair:#D5EEFB;
  --navy:#102E48;--navy-2:#0A2336;--navy-3:#163E5F;
  --blanc:#FFFFFF;--noir:#0C1116;--rouge:#E63329;--vert:#39B35A;--or:#F0A828;--violet:#9B5DE5;
  --ink:#11212E;--muted:#5E7689;--ligne:#E2ECF3;
  --ombre:0 10px 30px -12px rgba(8,30,48,.45);--r:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Outfit',sans-serif;color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;
  background:radial-gradient(1200px 600px at 80% -10%, rgba(99,192,238,.18), transparent 60%),linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);background-attachment:fixed;}
body::before{content:"";position:fixed;inset:auto 0 0 0;height:46vh;z-index:0;pointer-events:none;opacity:.9;
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='400' viewBox='0 0 1200 400'><path d='M0 400 L0 260 L180 120 L320 230 L470 70 L640 250 L760 150 L900 280 L1040 110 L1200 240 L1200 400 Z' fill='%230d2c47' opacity='.55'/><path d='M0 400 L0 320 L160 210 L300 300 L460 180 L620 320 L800 220 L960 330 L1120 210 L1200 280 L1200 400 Z' fill='%2308223a' opacity='.7'/></svg>") bottom/cover no-repeat;}
.app{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 14px calc(96px + env(safe-area-inset-bottom)) 14px}

.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:14px 4px 12px;margin-bottom:6px;background:linear-gradient(180deg,var(--navy) 55%, rgba(16,46,72,0))}
.logo-chip{flex:0 0 auto;width:46px;height:46px;border-radius:12px;background:#fff;display:grid;place-items:center;padding:4px;box-shadow:0 4px 12px -4px rgba(0,0,0,.5)}
.logo-chip img{width:100%;height:100%;object-fit:contain}
.brand{flex:1;min-width:0}
.brand .name{font-family:'Anton';font-size:21px;letter-spacing:.6px;color:#fff;line-height:1}
.brand .name b{color:var(--ciel-vif)}
.brand .slogan{font-family:'Oswald';font-weight:600;font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:#9cc4dd;margin-top:3px}
.hashtag{font-family:'Anton';font-size:11px;letter-spacing:1px;color:var(--ciel);background:rgba(79,174,224,.12);border:1px solid rgba(79,174,224,.35);padding:6px 9px;border-radius:999px;white-space:nowrap}
.lockbtn{flex:0 0 auto;border:1px solid rgba(79,174,224,.35);background:rgba(79,174,224,.12);color:#9cc4dd;width:38px;height:38px;border-radius:11px;display:grid;place-items:center;cursor:pointer;transition:.15s}
.lockbtn svg{width:18px;height:18px}
.lockbtn.open{background:var(--ciel);color:#06283f;border-color:var(--ciel)}

.view-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:6px 2px 16px}
.view-head h1{font-family:'Anton';color:#fff;font-size:30px;line-height:.95;letter-spacing:.5px;margin:0}
.view-head h1 .accent{color:var(--ciel-vif)}
.view-head p{margin:6px 0 0;color:#9cc4dd;font-size:13px;font-weight:500;max-width:60ch}

.card{background:var(--blanc);border-radius:var(--r);box-shadow:var(--ombre);padding:18px;margin-bottom:14px;position:relative;overflow:hidden}
.card.dark{background:linear-gradient(135deg,var(--navy-3),var(--navy-2));color:#eaf4fb}
.ck-label{font-family:'Oswald';font-weight:700;text-transform:uppercase;letter-spacing:1.5px;font-size:11px;color:var(--ciel);margin:0 0 4px}
.card h2{font-family:'Anton';font-size:19px;letter-spacing:.4px;margin:0 0 4px;color:inherit}
.card .sub{color:var(--muted);font-size:13px;margin:0 0 12px}
.card.dark .sub{color:#9cc4dd}

.hero{background:linear-gradient(140deg,#0e3454,#0a2034 70%);color:#fff;border-radius:20px;padding:24px 20px;position:relative;overflow:hidden;margin-bottom:14px;box-shadow:var(--ombre)}
.hero::after{content:"39";position:absolute;right:-4px;bottom:-26px;font-family:'Anton';font-size:150px;color:rgba(99,192,238,.07);line-height:1}
.hero .kicker{font-family:'Oswald';font-weight:600;letter-spacing:2px;text-transform:uppercase;font-size:11px;color:var(--ciel-vif)}
.hero .slg{font-family:'Anton';font-size:30px;line-height:1.02;margin:8px 0 2px;letter-spacing:.4px;max-width:14ch}
.hero .slg small{color:var(--ciel-vif)}

.values{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:6px}
.value{background:var(--noir);color:#fff;border-radius:13px;padding:14px 12px;text-align:center;border:1px solid rgba(255,255,255,.05)}
.value .v-ic{font-size:20px;display:block;margin-bottom:6px}
.value b{font-family:'Oswald';font-weight:700;letter-spacing:1px;font-size:14px;text-transform:uppercase}
.value span{display:block;color:#8fb6cf;font-size:11px;margin-top:3px}

.obj-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px dashed var(--ligne)}
.obj-row:last-child{border-bottom:0}
.obj-pill{flex:0 0 auto;width:88px;text-align:center;background:var(--ciel);color:#fff;font-family:'Oswald';font-weight:700;font-size:12px;text-transform:uppercase;padding:8px 4px;border-radius:10px}
.obj-row .txt{font-weight:600;color:var(--ink);font-size:14px}
.card.dark .obj-row{border-color:rgba(255,255,255,.12)} .card.dark .obj-row .txt{color:#eaf4fb}
.goal{display:flex;gap:12px;padding:12px 0;border-bottom:1px dashed var(--ligne)} .goal:last-child{border-bottom:0}
.goal .n{flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:var(--navy-3);color:#fff;font-family:'Anton';display:grid;place-items:center;font-size:15px}
.goal p{margin:0;font-size:13.5px;font-weight:500;line-height:1.4}

.subnav{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 12px;margin:-2px 0 4px;scrollbar-width:none}
.subnav::-webkit-scrollbar{display:none}
.subnav button{flex:0 0 auto;border:0;background:rgba(255,255,255,.08);color:#bcd9ec;font-family:'Oswald';font-weight:600;font-size:12px;letter-spacing:.4px;text-transform:uppercase;padding:9px 14px;border-radius:999px;cursor:pointer;transition:.15s}
.subnav button.on{background:var(--ciel);color:#06283f}

/* field svg statique */
.field-wrap{display:flex;justify-content:center;margin:2px 0 6px}
.field-wrap svg{width:100%;max-width:440px;height:auto;border-radius:12px;box-shadow:0 6px 18px -8px rgba(0,0,0,.5)}
.field-h svg{max-width:680px}

/* terrain interactif (ronds déplaçables) */
.terrain{position:relative;width:100%;max-width:760px;margin:0 auto;aspect-ratio:16/10;border-radius:12px;overflow:hidden;touch-action:none;box-shadow:0 6px 18px -8px rgba(0,0,0,.5);user-select:none}
.terrain svg.fld{position:absolute;inset:0;width:100%;height:100%}
.pl{position:absolute;width:36px;height:36px;transform:translate(-50%,-50%);border-radius:50%;display:grid;place-items:center;font-family:'Oswald';font-weight:700;font-size:15px;border:1.5px solid rgba(8,30,48,.55);box-shadow:0 2px 5px rgba(0,0,0,.3);touch-action:none}
.terrain[data-edit] .pl{cursor:grab}
.pl .x{position:absolute;top:-8px;right:-8px;width:17px;height:17px;border-radius:50%;background:var(--rouge);color:#fff;font-size:12px;display:grid;place-items:center;line-height:1;border:1.5px solid #fff}
.palette{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}
.palette button{border:0;width:32px;height:32px;border-radius:8px;background:var(--ciel-clair);color:var(--navy-3);font-family:'Oswald';font-weight:700;font-size:13px;cursor:pointer}
.palette button:hover{background:var(--ciel);color:#fff}
.hint-drag{text-align:center;color:var(--muted);font-size:12px;margin-top:8px}
.phase-block{margin-bottom:14px;padding-bottom:6px;border-bottom:1px dashed var(--ligne)}
.phase-block:last-of-type{border-bottom:0}
.phase-head{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 8px}
.phase-head span{font-family:'Oswald';font-weight:700;font-size:12px;letter-spacing:.8px;text-transform:uppercase;color:var(--navy-3);background:var(--ciel-clair);padding:5px 11px;border-radius:8px}
.arr{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:3}
.ah{position:absolute;width:15px;height:15px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.45);cursor:grab;touch-action:none;z-index:7}
.ah-passe{background:#e63329}.ah-course{background:#11212e}
.adel{position:absolute;width:17px;height:17px;border-radius:50%;transform:translate(-50%,-50%);background:#fff;color:#e63329;font-size:12px;display:grid;place-items:center;border:1.5px solid #e63329;cursor:pointer;z-index:8;line-height:1}
.pl{z-index:4}
.palette .pbtn{width:auto;padding:0 12px;font-size:11px;letter-spacing:.5px}
.palette .pbtn.passe{background:#fbe0de;color:#b5271e}.palette .pbtn.passe:hover{background:#e63329;color:#fff}
.palette .pbtn.course{background:#dfe6ec;color:#11212e}.palette .pbtn.course:hover{background:#11212e;color:#fff}

.zone-card{border-radius:14px;padding:14px 16px;color:#fff;position:relative;overflow:hidden;margin-bottom:10px}
.zone-card.sommet{background:linear-gradient(135deg,#0b3a22,#0f5e34)}
.zone-card.combe{background:linear-gradient(135deg,#1d6e8f,#2a9bc7)}
.zone-card.falaise{background:linear-gradient(135deg,#173a59,#235d8c)}
.zone-card h3{font-family:'Anton';margin:0 0 4px;font-size:18px;letter-spacing:1px}
.zone-card .acts{font-size:13px;font-weight:600;opacity:.96}
.zone-card .att{margin-top:8px;font-size:11.5px;color:#e9f6ff;background:rgba(0,0,0,.22);display:inline-block;padding:6px 10px;border-radius:8px;line-height:1.5}
.zone-card .badge{position:absolute;top:12px;right:14px;font-family:'Anton';font-size:11px;background:rgba(255,255,255,.18);padding:5px 9px;border-radius:7px;letter-spacing:.5px}

.play{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--ligne)} .play:last-child{border-bottom:0}
.play .code{flex:0 0 auto;min-width:46px;text-align:center;font-family:'Anton';font-size:15px;color:#fff;background:var(--rouge);border-radius:9px;padding:8px 6px;letter-spacing:.5px}
.play .code.or{background:var(--or)} .play .code.ciel{background:var(--ciel)} .play .code.navy{background:var(--navy-3)}
.play .body{flex:1;min-width:0}
.play .body .nm{font-family:'Oswald';font-weight:700;font-size:14px;color:var(--ink);letter-spacing:.3px}
.play .body .meta{font-size:12px;color:var(--muted);margin-top:2px} .play .body .meta b{color:var(--navy-3)}
.play.tap{cursor:pointer} .play.tap:hover{background:#f7fbfe}
.play .chev{color:var(--ciel);flex:0 0 auto}

.icon-btn{border:0;background:var(--ciel-clair);color:var(--navy-3);width:34px;height:34px;border-radius:9px;display:grid;place-items:center;cursor:pointer;transition:.15s}
.icon-btn:hover{background:var(--ciel);color:#fff}
.icon-btn.danger{background:#fde3e1;color:#c22} .icon-btn.danger:hover{background:var(--rouge);color:#fff}
.icon-btn svg{width:16px;height:16px}
.add-btn{width:100%;border:2px dashed var(--ligne);background:transparent;color:var(--muted);padding:13px;border-radius:12px;font-family:'Oswald';font-weight:600;letter-spacing:.5px;text-transform:uppercase;font-size:12.5px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
.add-btn:hover{border-color:var(--ciel);color:var(--ciel)} .add-btn svg{width:16px;height:16px}
.edit-pencil{position:absolute;top:14px;right:14px;border:0;background:var(--ciel-clair);color:var(--navy-3);width:32px;height:32px;border-radius:9px;display:grid;place-items:center;cursor:pointer;z-index:4}
.edit-pencil:hover{background:var(--ciel);color:#fff} .edit-pencil svg{width:15px;height:15px}
.btn{border:0;border-radius:11px;padding:12px 16px;font-family:'Oswald';font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-size:13px;cursor:pointer;transition:.15s}
.btn.primary{background:var(--ciel);color:#06283f} .btn.primary:hover{background:var(--ciel-vif)}
.btn.ghost{background:transparent;color:var(--muted)} .btn.full{width:100%}

.tbl-wrap{overflow-x:auto;border-radius:12px;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;width:100%;font-size:13px;background:#fff}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--ligne);white-space:nowrap}
th{font-family:'Oswald';font-weight:700;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--navy-3);background:var(--ciel-clair);position:sticky;top:0}
td.num,th.num{text-align:center}
tr:last-child td{border-bottom:0}
.tag{font-family:'Oswald';font-weight:700;font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:4px 8px;border-radius:7px;color:#fff;display:inline-block}
.t-type{background:var(--ciel)}.t-type3{background:#2d8fbf}.t-typeoff{background:#7fb4cf}.t-inter{background:var(--or)}.t-off{background:#94a7b6}.t-repos{background:#7d93a3}.t-vac{background:#7d93a3}.t-repli{background:var(--violet)}.t-stage{background:var(--vert)}.t-autre{background:#94a7b6}.t-match{background:var(--rouge)}
.eq1{background:var(--navy-3);color:#fff}.eq2{background:var(--ciel);color:#06283f}
tr.j-recrue td{background:#e3f5cf}
tr.j-cible td{background:#fbe0de;color:#8a1d16}
tr.j-cible td b{color:#8a1d16}
.badge-st{font-family:'Oswald';font-weight:700;font-size:10px;letter-spacing:.5px;text-transform:uppercase;padding:3px 7px;border-radius:6px;display:inline-block}
.badge-st.rec{background:var(--vert);color:#fff}
.badge-st.cib{background:var(--rouge);color:#fff}
.badge-st.eff{background:#dbe5ec;color:var(--navy-3)}
.j-counter{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.j-counter .jc{background:#fff;border-radius:11px;padding:10px 12px;box-shadow:var(--ombre)}
.j-counter .jc h4{font-family:'Anton';font-size:14px;margin:0 0 6px;letter-spacing:.5px}
.j-counter .jc .ln{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;margin:2px 0}
.j-counter .jc .ln .v{font-family:'Oswald';font-weight:700;font-size:14px}
.j-counter .jc .ln.eff .v{color:var(--navy-3)}
.j-counter .jc .ln.rec .v{color:var(--vert)}
.j-counter .jc .ln.cib .v{color:var(--rouge)}
.j-from{font-size:11px;color:var(--muted);font-style:italic}
/* trombinoscope */
.tromb-eq{font-family:'Anton';font-size:15px;letter-spacing:1px;color:#fff;background:var(--navy-3);padding:7px 12px;border-radius:8px;margin:14px 0 8px;display:inline-block}
.tromb-eq.e2{background:var(--ciel);color:#06283f}
.tromb-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:520px){.tromb-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:760px){.tromb-grid{grid-template-columns:repeat(4,1fr)}}
.tcard{background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--ombre);cursor:pointer;position:relative;display:flex;flex-direction:column;border:2px solid transparent;transition:transform .12s}
.tcard:active{transform:scale(.97)}
.tcard.rec{border-color:var(--vert)}
.tcard.cib{border-color:var(--rouge)}
.tcard .ph{position:relative;width:100%;padding-bottom:100%;background:linear-gradient(135deg,#163E5F,#0A2336);overflow:hidden}
.tcard .ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.tcard .ph .ini{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-family:'Anton';font-size:34px;letter-spacing:2px}
.tcard .ph .pn{position:absolute;left:6px;top:6px;width:26px;height:26px;border-radius:50%;background:var(--ciel);color:#06283f;font-family:'Anton';display:grid;place-items:center;font-size:13px;border:2px solid #fff}
.tcard .ph .eq{position:absolute;right:6px;top:6px;font-family:'Oswald';font-weight:700;font-size:10px;padding:3px 7px;border-radius:6px}
.tcard .ph .eq.e1{background:var(--navy-3);color:#fff}
.tcard .ph .eq.e2{background:var(--ciel);color:#06283f}
.tcard .ph .age{position:absolute;right:6px;bottom:6px;font-family:'Anton';font-size:11px;color:#fff;background:rgba(0,0,0,.55);padding:3px 7px;border-radius:6px;letter-spacing:.5px}
.tcard .ph .stb{position:absolute;left:6px;bottom:6px;font-family:'Oswald';font-weight:700;font-size:9.5px;text-transform:uppercase;padding:3px 7px;border-radius:6px;letter-spacing:.5px}
.tcard .ph .stb.rec{background:var(--vert);color:#fff}
.tcard .ph .stb.cib{background:var(--rouge);color:#fff}
.tcard .ft{padding:8px 9px 10px}
.tcard .ft .nm{font-family:'Oswald';font-weight:700;font-size:12.5px;color:var(--navy-3);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tcard .ft .po{font-size:10.5px;color:var(--muted);margin-top:2px}
.phbtn{display:flex;gap:8px;align-items:center;margin-top:8px}
.phbtn .phprev{width:72px;height:72px;border-radius:10px;overflow:hidden;background:linear-gradient(135deg,#163E5F,#0A2336);position:relative;flex:0 0 auto}
.phbtn .phprev img{width:100%;height:100%;object-fit:cover;display:block}
.phbtn .phprev .ini{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-family:'Anton';font-size:22px}
.phbtn .phact{display:flex;flex-direction:column;gap:5px;flex:1}
.phbtn .phact label{font-family:'Oswald';font-weight:700;font-size:11px;color:var(--rouge);background:#fff;border:1.5px solid var(--rouge);border-radius:8px;padding:7px 10px;text-align:center;cursor:pointer;letter-spacing:.5px}
.phbtn .phact label:hover{background:var(--rouge);color:#fff}
.phbtn .phact button{border:1px solid var(--ligne);background:#fff;color:var(--muted);border-radius:8px;padding:5px 10px;font-family:'Oswald';font-size:10.5px;cursor:pointer}
.cell-in{width:54px;border:1px solid var(--ligne);border-radius:7px;padding:6px 4px;text-align:center;font-family:'Outfit';font-weight:600}
.cell-in:focus{outline:0;border-color:var(--ciel)}
.sticky-col{position:sticky;left:0;background:#fff;z-index:2;box-shadow:2px 0 0 var(--ligne)}
th.sticky-col{background:var(--ciel-clair);z-index:3}
.mini-toggle{display:inline-flex;border-radius:7px;overflow:hidden;border:1px solid var(--ligne)}
.mini-toggle button{border:0;background:#fff;color:var(--muted);font-family:'Oswald';font-weight:700;font-size:10px;padding:4px 7px;cursor:pointer}
.mini-toggle button.on{background:var(--ciel);color:#06283f}
.money{font-family:'Oswald';font-weight:700;color:var(--navy-3)} .money.tot{color:var(--ciel)}

.stsel{border:1px solid var(--ligne);border-radius:7px;padding:6px 4px;font-family:'Oswald';font-weight:700;font-size:11px;text-align:center;background:#fff;color:var(--muted);width:62px;cursor:pointer}
.st-V{background:var(--vert);color:#fff;border-color:var(--vert)}
.st-D{background:var(--rouge);color:#fff;border-color:var(--rouge)}
.st-BV{background:var(--ciel);color:#06283f;border-color:var(--ciel)}
.st-BD{background:var(--or);color:#3a2600;border-color:var(--or)}
.st-BL{background:var(--violet);color:#fff;border-color:var(--violet)}
.st-HG{background:#b6c4cf;color:#26414f;border-color:#b6c4cf}
.st-ABS{background:#46586a;color:#fff;border-color:#46586a}
.pr-1{background:var(--vert);color:#fff;border-color:var(--vert)}
.pr-TRAV{background:#2e9e55;color:#fff;border-color:#2e9e55}
.pr-BL{background:var(--violet);color:#fff;border-color:var(--violet)}
.pr-ABS{background:var(--rouge);color:#fff;border-color:var(--rouge)}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.legend span{font-family:'Oswald';font-weight:700;font-size:10px;padding:4px 8px;border-radius:6px;color:#fff}

.month{margin-bottom:10px;border-radius:13px;overflow:hidden;background:#fff;box-shadow:var(--ombre)}
.month-h{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;background:linear-gradient(135deg,var(--navy-3),var(--navy-2));color:#fff}
.month-h .mt{font-family:'Anton';font-size:16px;letter-spacing:.5px}
.month-h .mc{font-size:12px;color:#9cc4dd}

let fbReady=false,fbUser=null,fbAuthed=false,fbSubs=[];
function fbWait(){return new Promise(res=>{
  if(window.__fb){fbReady=true;return res();}
  const t=setTimeout(()=>{console.warn('Firebase SDK timeout — mode hors-ligne');res();},6000);
  window.addEventListener('fb-ready',()=>{clearTimeout(t);fbReady=true;res();},{once:true});
});}
async function sGet(k,d){try{if(!fbReady)return d;const ref=window.__fb.doc(window.__fb.db,'fcsc',k);const snap=await window.__fb.getDoc(ref);return snap.exists()?JSON.parse(snap.data().v):d;}catch(e){console.error('sGet',k,e);return d;}}
async function sSet(k){
  if(!fbReady){toast("⚠️ Connexion en cours…");return;}
  if(!fbAuthed){toast("🔒 Connecte-toi avec Google pour modifier");return;}
  try{const ref=window.__fb.doc(window.__fb.db,'fcsc',k);await window.__fb.setDoc(ref,{v:JSON.stringify(DB[k]),at:Date.now()});}
  catch(e){console.error('sSet',k,e);if(e&&e.code==='permission-denied')toast("⚠️ Pas d'autorisation d'écriture");else toast("⚠️ Sauvegarde échouée — réessaie");}
}
async function loadAll(){for(const k of KEYS){DB[k]=await sGet(k,null);if(DB[k]==null){DB[k]=DEFAULTS[k];if(fbAuthed)await sSet(k);}}}
function subscribeAll(){
  fbSubs.forEach(u=>{try{u();}catch(e){}});fbSubs=[];
  for(const k of KEYS){
    const ref=window.__fb.doc(window.__fb.db,'fcsc',k);
    const un=window.__fb.onSnapshot(ref,snap=>{
      if(snap.exists()){try{DB[k]=JSON.parse(snap.data().v);if(!$('#modalBg').classList.contains('show'))render();}catch(e){console.error('snap parse',k,e);}}
    },err=>console.error('snap',k,err));
    fbSubs.push(un);
  }
}
async function maybeSeedDefaults(){
  if(!fbAuthed)return;
  for(const k of KEYS){
    try{const ref=window.__fb.doc(window.__fb.db,'fcsc',k);const snap=await window.__fb.getDoc(ref);if(!snap.exists()){DB[k]=DB[k]||DEFAULTS[k];await sSet(k);}}catch(e){console.error('seed',k,e);}
  }
}
async function signInGoogle(){try{const provider=new window.__fb.GoogleAuthProvider();await window.__fb.signInWithPopup(window.__fb.auth,provider);}catch(e){console.error('signin',e);toast("Connexion annulée");}}
async function signOutFb(){await window.__fb.signOut(window.__fb.auth);editUnlocked=false;render();toast("Déconnecté");}
function setupAuthListener(){
  window.__fb.onAuthStateChanged(window.__fb.auth,async user=>{
    fbUser=user;fbAuthed=!!user&&user.email===WRITER_EMAIL;
    if(fbAuthed)await maybeSeedDefaults();
    if(user&&!fbAuthed){toast("⚠️ Compte non autorisé en écriture");}
    render();
  });
}

function fieldSVG(){return `<svg class="fld" viewBox="0 0 520 325" preserveAspectRatio="none">
  <rect width="520" height="325" fill="#2f9e4d"/>

</svg>`;}
function plColor(n){if(n<=8)return{bg:'#3f8fe0',fg:'#fff'};if(n===11||n===12||n===13||n===14)return{bg:'#9aa9b5',fg:'#22333f'};return{bg:'#ffffff',fg:'#11212e'};}
// flèches : x,y en % ; viewBox 160x100 (ratio 16/10 = aucun étirement)
function arrowsInner(arrows){
  return (arrows||[]).map(a=>{
    const X1=a.x1*1.6,Y1=a.y1,X2=a.x2*1.6,Y2=a.y2;
    const ang=Math.atan2(Y2-Y1,X2-X1),h=4.4,sp=0.45;
    const col=a.t==='passe'?'#e63329':'#11212e';
    const bx=X2-h*0.85*Math.cos(ang),by=Y2-h*0.85*Math.sin(ang);
    const p1x=(X2-h*Math.cos(ang-sp)).toFixed(1),p1y=(Y2-h*Math.sin(ang-sp)).toFixed(1);
    const p2x=(X2-h*Math.cos(ang+sp)).toFixed(1),p2y=(Y2-h*Math.sin(ang+sp)).toFixed(1);
    const dash=a.t==='passe'?'stroke-dasharray="3.4 2.6" ':'';
    const sw=a.t==='passe'?1.5:1.9;
    return `<line x1="${X1.toFixed(1)}" y1="${Y1.toFixed(1)}" x2="${bx.toFixed(1)}" y2="${by.toFixed(1)}" stroke="${col}" stroke-width="${sw}" stroke-linecap="round" ${dash}/><polygon points="${X2.toFixed(1)},${Y2.toFixed(1)} ${p1x},${p1y} ${p2x},${p2y}" fill="${col}"/>`;
  }).join('');
}
function terrainHTML(id,circles,arrows,editable){
  const pls=circles.map((c,i)=>{const col=plColor(c.n);return `<div class="pl" data-i="${i}" style="left:${c.x}%;top:${c.y}%;background:${col.bg};color:${col.fg}"><span>${c.n}</span>${editable?'<i class="x">×</i>':''}</div>`;}).join('');
  const arr=`<svg class="arr" viewBox="0 0 160 100" preserveAspectRatio="none">${arrowsInner(arrows)}</svg>`;
  let pal='';
  if(editable){pal=`<div class="palette">${Array.from({length:15},(_,k)=>k+1).map(n=>`<button data-add="${n}">${n}</button>`).join('')}<button class="pbtn passe" data-arrow="passe">↳ Passe</button><button class="pbtn course" data-arrow="course">→ Course</button></div><div class="hint-drag">Numéro = joueur · Passe (rouge pointillé) / Course (noir plein) · glisse les points · × pour retirer</div>`;}
  return `<div class="terrain" id="${id}" ${editable?'data-edit="1"':''}>${fieldSVG()}${arr}${pls}</div>${pal}`;
}
function attachTerrain(id,circles,arrows,editable,save){
  const terrain=document.getElementById(id);if(!terrain)return;
  const root=terrain.parentNode;
  arrows=arrows||[];
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  function redraw(){
    terrain.querySelectorAll('.pl,.ah,.adel').forEach(e=>e.remove());
    circles.forEach((c,i)=>{const col=plColor(c.n);const d=document.createElement('div');d.className='pl';d.dataset.i=i;d.style.left=c.x+'%';d.style.top=c.y+'%';d.style.background=col.bg;d.style.color=col.fg;d.innerHTML=`<span>${c.n}</span>${editable?'<i class="x">×</i>':''}`;terrain.appendChild(d);});
    drawArrows();
    if(editable){arrows.forEach((a,i)=>{
      [['1',a.x1,a.y1],['2',a.x2,a.y2]].forEach(([e,x,y])=>{const h=document.createElement('div');h.className='ah ah-'+a.t;h.dataset.ai=i;h.dataset.ae=e;h.style.left=x+'%';h.style.top=y+'%';terrain.appendChild(h);});
      const del=document.createElement('div');del.className='adel';del.dataset.ai=i;del.textContent='×';del.style.left=((a.x1+a.x2)/2)+'%';del.style.top=((a.y1+a.y2)/2)+'%';terrain.appendChild(del);
    });}
    bind();
  }
  function bind(){
    if(!editable)return;
    terrain.querySelectorAll('.pl').forEach(el=>{
      const i=+el.dataset.i;const xb=el.querySelector('.x');
      if(xb)xb.addEventListener('pointerdown',e=>{e.stopPropagation();e.preventDefault();circles.splice(i,1);save();redraw();});
      el.addEventListener('pointerdown',e=>{if(e.target.classList.contains('x'))return;e.preventDefault();try{el.setPointerCapture(e.pointerId);}catch(_){}
        const rect=terrain.getBoundingClientRect();
        const move=ev=>{let x=clamp((ev.clientX-rect.left)/rect.width*100,3,97),y=clamp((ev.clientY-rect.top)/rect.height*100,4,96);circles[i].x=Math.round(x);circles[i].y=Math.round(y);el.style.left=x+'%';el.style.top=y+'%';};
        const up=()=>{el.removeEventListener('pointermove',move);el.removeEventListener('pointerup',up);save();};
        el.addEventListener('pointermove',move);el.addEventListener('pointerup',up);});
    });
    terrain.querySelectorAll('.ah').forEach(el=>{
      const i=+el.dataset.ai,end=el.dataset.ae;
      el.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();try{el.setPointerCapture(e.pointerId);}catch(_){}
        const rect=terrain.getBoundingClientRect();
        const move=ev=>{let x=clamp((ev.clientX-rect.left)/rect.width*100,2,98),y=clamp((ev.clientY-rect.top)/rect.height*100,3,97);arrows[i]['x'+end]=Math.round(x);arrows[i]['y'+end]=Math.round(y);el.style.left=x+'%';el.style.top=y+'%';drawArrows();midDel(i);};
        const up=()=>{el.removeEventListener('pointermove',move);el.removeEventListener('pointerup',up);save();};
        el.addEventListener('pointermove',move);el.addEventListener('pointerup',up);});
    });
    terrain.querySelectorAll('.adel').forEach(el=>{const i=+el.dataset.ai;el.addEventListener('pointerdown',e=>{e.stopPropagation();e.preventDefault();arrows.splice(i,1);save();redraw();});});
  }
  if(editable&&root){
    root.querySelectorAll('.palette [data-add]').forEach(b=>b.onclick=()=>{circles.push({n:+b.dataset.add,x:50,y:50});save();redraw();});
    root.querySelectorAll('.palette [data-arrow]').forEach(b=>b.onclick=()=>{arrows.push({t:b.dataset.arrow,x1:42,y1:55,x2:62,y2:45});save();redraw();});
  }
  redraw();
}

function dFmt(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return `${d}/${m}/${y}`;}

/* ===== 4) ENTRAINEMENTS ===== */
function mondayOf(iso){const d=new Date(iso+'T12:00');const wd=d.getDay();const off=wd===0?6:wd-1;d.setDate(d.getDate()-off);return d;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function isoOf(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function genSeances(){
  const days={type:[2,4],type3:[1,2,4],typeoff:[2,4],inter:[2,4],stage:[2,4]};
  const map={};
  DB.content.planning.forEach(w=>{const dd=days[w.type];if(!dd)return;const mon=mondayOf(w.date);dd.forEach(n=>{const dt=isoOf(addDays(mon,n));if(!map[dt])map[dt]={date:dt,wtype:w.type,label:w.label};});});
  return Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
}

function addMin(hhmm,min){let p=(hhmm||'19:00').split(':');let t=(+p[0])*60+(+p[1])+(+min||0);t=((t%1440)+1440)%1440;return String(Math.floor(t/60)).padStart(2,'0')+'H'+String(t%60).padStart(2,'0');}

function primeFor(st,j){const s=DB.settings;if(st==='V')return +j.primeV||0;if(st==='D')return +j.primeD||0;if(st==='BV')return +s.primeBV||0;if(st==='BD')return +s.primeBD||0;return 0;}
function seByMonth(){const m={};MONTHS_DIR.forEach(k=>m[k]=[]);genSeances().forEach(s=>{const k=mKey(s.date);if(m[k])m[k].push(s);});return m;}
// % de présence du mois : 1/Trav/BL comptent présents ; ABS absent ; non-renseigné ignoré ; rien => 100%
function pctMois(j,sessions){let rec=0,pres=0;sessions.forEach(s=>{const st=DB.presence[s.date+':'+j.id]||'';if(st){rec++;if(st==='1'||st==='TRAV'||st==='BL')pres++;}});return rec?pres/rec:1;}
// coût du mois = fixe + primes des matchs NON amicaux
function coutMois(j,k){let prime=0;DB.matchs.filter(m=>mKey(m.date)===k&&!isAmical(m)).forEach(m=>{prime+=primeFor(DB.resultats[m.id+':'+j.id]||'',j);});return (+j.fixe||0)+prime;}
function payMois(j,k,sessions){const pct=pctMois(j,sessions);const cout=coutMois(j,k);const seuil=(+DB.settings.seuilPct||70)/100;const pay=pct<seuil?0:Math.round(pct*cout);return {pct,cout,pay,zero:pct<seuil};}

function dirPaie(){
  const J=DB.joueurs.filter(isActif).sort((a,b)=>a.nom.localeCompare(b.nom,'fr'));

  const byM=seByMonth();
  let grand=0; const colTot={}; MONTHS_DIR.forEach(k=>colTot[k]=0);
  const rows=J.map(j=>{let tot=0;
    const cells=MONTHS_DIR.map(k=>{const r=payMois(j,k,byM[k]);tot+=r.pay;colTot[k]+=r.pay;
      const col=r.zero?'var(--rouge)':'var(--navy-3)';
      return `<td class="num"><span class="money" style="color:${col}">${r.pay}</span><div style="font-size:10px;color:${r.zero?'var(--rouge)':'#9bb0bf'}">${Math.round(r.pct*100)}%</div></td>`;}).join('');
    grand+=tot;
    return `<tr><td class="sticky-col">${esc(j.nom)}</td><td class="num"><span class="money">${+j.fixe||0}</span></td>${cells}<td class="num"><span class="money tot">${tot}€</span></td></tr>`;}).join('');

    <div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap">
      <div>BV (victoire É2) : <b style="color:#fff">${s.primeBV}€</b></div><div>BD (défaite É2) : <b style="color:#fff">${s.primeBD}€</b></div>
      <div>Seuil présence : <b style="color:#fff">${seuil}%</b></div>
      <button class="btn primary" data-act="editPrimesE2">Modifier</button></div>
    <p class="sub" style="margin:10px 0 0">Paie du mois = <b style="color:#fff">% présence × coût</b> (fixe + primes). En dessous de ${seuil}% → 0 € (rouge). BL/HG/ABS match = 0 € de prime. <b style="color:#fff">Matchs amicaux exclus</b> du calcul.</p></div>

  <div class="month"><div class="month-h" data-tarifs="1">
      <div><div class="mt">Tarifs par joueur</div><div class="mc">Fixe + primes É1 · ${J.length} joueurs ${tarifsOpen?'· ouvert':'· fermé'}</div></div>
      <div style="color:#9cc4dd">${svg(IC.chevd)}</div></div>
    <div class="month-b ${tarifsOpen?'':'hide'}">
    <p class="sub" style="margin:4px 0 10px">Fixe mensuel + prime victoire / défaite Équipe 1.</p>
    <div class="tbl-wrap"><table><thead><tr><th class="sticky-col">Joueur</th><th class="num">Fixe /mois</th><th class="num">Prime V (É1)</th><th class="num">Prime D (É1)</th></tr></thead><tbody>
    ${J.map(j=>`<tr><td class="sticky-col">${esc(j.nom)}</td>
      <td class="num"><input class="cell-in" type="number" min="0" data-price="${j.id}:fixe" value="${+j.fixe||0}"></td>
      <td class="num"><input class="cell-in" type="number" min="0" data-price="${j.id}:primeV" value="${+j.primeV||0}"></td>
      <td class="num"><input class="cell-in" type="number" min="0" data-price="${j.id}:primeD" value="${+j.primeD||0}"></td></tr>`).join('')}
    </tbody></table></div></div></div>

  <div class="card" style="padding:14px"><p class="ck-label">À payer — mois par mois (présence appliquée)</p>
    <p class="sub">Montant net = % présence du mois × (fixe + primes hors amicaux). Petit % affiché sous chaque montant.</p>
    <div class="tbl-wrap"><table><thead><tr><th class="sticky-col">Joueur</th><th class="num">Fixe</th>
      ${MONTHS_DIR.map(k=>`<th class="num">${mCourt(k)}</th>`).join('')}<th class="num">Total saison</th></tr></thead><tbody>
      ${rows}
      <tr style="background:var(--ciel-clair)"><td class="sticky-col"><b>TOTAL CLUB</b></td><td class="num"></td>
      ${MONTHS_DIR.map(k=>`<td class="num"><b class="money">${colTot[k]}€</b></td>`).join('')}
      <td class="num"><b class="money tot">${grand}€</b></td></tr>
    </tbody></table></div></div>`;
}

/* ===== BINDINGS ===== */
function bindView(){
  view.querySelectorAll('[data-jeutab]').forEach(b=>b.onclick=()=>{jeuTab=b.dataset.jeutab;render();});
  view.querySelectorAll('[data-dirtab]').forEach(b=>b.onclick=()=>{dirTab=b.dataset.dirtab;render();});
  view.querySelectorAll('[data-pmonth]').forEach(b=>b.onclick=()=>{openMonthEntr=openMonthEntr===b.dataset.pmonth?'':b.dataset.pmonth;render();});
  view.querySelectorAll('[data-emonth]').forEach(b=>b.onclick=()=>{openMonthEntr=openMonthEntr===b.dataset.emonth?'':b.dataset.emonth;render();});
  view.querySelectorAll('[data-dmonth]').forEach(b=>b.onclick=()=>{openMonthDir=openMonthDir===b.dataset.dmonth?'':b.dataset.dmonth;render();});
  view.querySelectorAll('[data-demonth]').forEach(b=>b.onclick=()=>{openMonthDirE=openMonthDirE===b.dataset.demonth?'':b.dataset.demonth;render();});
  view.querySelectorAll('[data-tarifs]').forEach(b=>b.onclick=()=>{tarifsOpen=!tarifsOpen;render();});
  view.querySelectorAll('[data-mpick]').forEach(b=>b.onclick=()=>{curMatch=b.dataset.mpick;render();});
  view.querySelectorAll('[data-mtab]').forEach(b=>b.onclick=()=>{matchTab=b.dataset.mtab;render();});
  view.querySelectorAll('[data-tzone]').forEach(b=>b.onclick=()=>{toucheZone=b.dataset.tzone;render();});
  view.querySelectorAll('[data-joutab]').forEach(b=>b.onclick=()=>{joueursTab=b.dataset.joutab;render();});
  view.querySelectorAll('[data-pres]').forEach(sel=>sel.onchange=()=>{const k=sel.dataset.pres;DB.presence[k]=sel.value;sSet('presence');render();});
  view.querySelectorAll('[data-tj]').forEach(inp=>inp.onchange=()=>{const k=inp.dataset.tj;DB.tempsjeu[k]=DB.tempsjeu[k]||{};DB.tempsjeu[k].min=inp.value;sSet('tempsjeu');});
  view.querySelectorAll('[data-tjst]').forEach(sel=>sel.onchange=()=>{const k=sel.dataset.tjst;DB.tempsjeu[k]=DB.tempsjeu[k]||{};DB.tempsjeu[k].st=sel.value;sSet('tempsjeu');sel.className='stsel st-'+sel.value;});
  view.querySelectorAll('[data-tjeq]').forEach(tg=>tg.querySelectorAll('button').forEach(b=>b.onclick=()=>{const k=tg.dataset.tjeq;DB.tempsjeu[k]=DB.tempsjeu[k]||{};DB.tempsjeu[k].eq=(DB.tempsjeu[k].eq===b.dataset.eq?'':b.dataset.eq);sSet('tempsjeu');render();}));
  view.querySelectorAll('[data-res]').forEach(sel=>sel.onchange=()=>{const k=sel.dataset.res;DB.resultats[k]=sel.value;sSet('resultats');sel.className='stsel st-'+sel.value;});
  view.querySelectorAll('[data-price]').forEach(inp=>inp.onchange=()=>{const[id,f]=inp.dataset.price.split(':');const j=DB.joueurs.find(x=>x.id===id);if(j){j[f]=+inp.value||0;sSet('joueurs');render();}});
  view.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>handle(b.dataset.act,b.dataset));
}

function handle(act,d){
  const c=DB.content;
  switch(act){
    case 'editObjSaison':
      openModal('Objectifs de la saison',[f('Résultats','resultats',c.objSaison.resultats),f('Performance','performance',c.objSaison.performance),f('Processus','processus',c.objSaison.processus)],
        v=>{Object.assign(c.objSaison,v);sSet('content');render();toast('Enregistré ✓');});break;
    case 'editObjClub':
      openModal('Objectifs du club',c.objClub.map((g,i)=>fArea('Objectif '+(i+1),'o'+i,g)),
        v=>{c.objClub=Object.keys(v).map(k=>v[k]).filter(x=>x.trim());sSet('content');render();toast('Enregistré ✓');});break;
    case 'editText':{const p=d.path;openTextEditor('Modifier le texte',getPath(c,p),nv=>{setPath(c,p,nv);sSet('content');render();toast('Enregistré ✓');});break;}
    case 'editPhilo':{const ph=Array.isArray(c.philosophie)&&c.philosophie.length?c.philosophie:["","",""];
      openModal('Nos philosophies de jeu',[f('Philosophie 1','p0',ph[0]||''),f('Philosophie 2','p1',ph[1]||''),f('Philosophie 3','p2',ph[2]||'')],
        v=>{c.philosophie=[v.p0,v.p1,v.p2].map(x=>x.trim()).filter(Boolean);sSet('content');render();toast('Enregistré ✓');});break;}
    case 'editZoneL':{const z=c.zonesLongueur[+d.i];openModal('Zone : '+z.nom,[f('Badge','badge',z.badge),fArea('Actions','actions',z.actions),fArea('Attitudes','attitudes',z.attitudes)],
      v=>{Object.assign(z,v);sSet('content');render();toast('Enregistré ✓');});break;}
    case 'editRedisNote': openTextEditor('Texte de la redistribution',c.redistribution.note,nv=>{c.redistribution.note=nv;sSet('content');render();toast('Enregistré ✓');});break;

    case 'openLanc': lancSlide(c.lancements.find(x=>x.id===d.id));break;
    case 'addLanc': editLanc(null,d.src);break;
    case 'editLanc': editLanc(c.lancements.find(x=>x.id===d.id));break;
    case 'delLanc': confirmDel('Supprimer ce lancement ?',()=>{c.lancements=c.lancements.filter(x=>x.id!==d.id);sSet('content');render();});break;

    case 'addWeek': editWeek(null,d.month);break;
    case 'editWeek': editWeek(c.planning.find(x=>x.id===d.id));break;
    case 'delWeek': confirmDel('Supprimer ce repère ?',()=>{c.planning=c.planning.filter(x=>x.id!==d.id);sSet('content');render();});break;
    case 'addMatch': editMatch(null,d.month);break;
    case 'editMatch': editMatch(DB.matchs.find(x=>x.id===d.id));break;

    case 'editSeance':{if(!editUnlocked)return;editSeance(d.date);break;}

    case 'addJoueur': editJoueur(null,joueursTab==='tromb'?'light':'full');break;
    case 'addCible': editJoueur({id:uid(),num:'',nom:'',poste:'',equipe:'1',fixe:0,primeV:300,primeD:200,status:'cible',from:'',annee:'',photo:''},joueursTab==='tromb'?'light':'full');break;
    case 'editJoueur': editJoueur(DB.joueurs.find(x=>x.id===d.id),joueursTab==='tromb'?'light':'full');break;
    case 'delJoueur': confirmDel('Supprimer ce joueur ?\nSes minutes, présences et résultats seront aussi nettoyés.',()=>{delJoueurClean(d.id);render();toast('Joueur supprimé ✓');});break;
    case 'officialiser':{const j=DB.joueurs.find(x=>x.id===d.id);if(j){j.status='recrue';sSet('joueurs');render();toast('Recrue officialisée ✓');}break;}

    case 'editMObj':{if(!editUnlocked)return;const c=carnetOf(d.id);
      openModal('Objectifs de match',[fArea('Attaque','objAtt',c.objAtt),fArea('Défense','objDef',c.objDef)],
        v=>{const cc=carnetOf(d.id);cc.objAtt=v.objAtt;cc.objDef=v.objDef;DB.carnets[d.id]=cc;sSet('carnets');render();toast('Enregistré ✓');});break;}
    case 'editCompo':{if(!editUnlocked)return;editCompo(d.id,d.eq);break;}
    case 'editMenu':{if(!editUnlocked)return;editMenu(d.id);break;}
    case 'editPrimesE2': openModal('Primes É2 & seuil présence',[fRow([f('BV (victoire)','primeBV',DB.settings.primeBV),f('BD (défaite)','primeBD',DB.settings.primeBD)]),f('Seuil présence (%) — en dessous, paie = 0','seuilPct',DB.settings.seuilPct||70)],
      v=>{DB.settings.primeBV=+v.primeBV||0;DB.settings.primeBD=+v.primeBD||0;DB.settings.seuilPct=+v.seuilPct||70;sSet('settings');render();toast('Enregistré ✓');});break;

    case 'unlock':{const v=$('#pinIn').value;if(v===DB.settings.pin){dirUnlocked=true;render();toast('Accès autorisé ✓');}else toast('Code incorrect');break;}
    case 'changePin': openModal('Code Direction (6 chiffres)',[f('Nouveau code','pin',DB.settings.pin)],v=>{DB.settings.pin=(v.pin||DB.settings.pin).slice(0,6);sSet('settings');toast('Code mis à jour ✓');});break;
    case 'changeEditPin': openModal('Code d\u2019édition (staff)',[f('Nouveau code staff','editPin',DB.settings.editPin||'192837')],v=>{DB.settings.editPin=(v.editPin||DB.settings.editPin||'192837');sSet('settings');toast('Code staff mis à jour ✓');});break;
    case 'exportData':{const obj={app:'FCSC',ver:'fcsc29',date:new Date().toISOString(),data:{}};KEYS.forEach(k=>obj.data[k]=DB[k]);const txt=JSON.stringify(obj);
      try{const blob=new Blob([txt],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='FCSC_sauvegarde_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);}catch(e){}
      $('#modal').innerHTML=`<div class="grip"></div><h3>Sauvegarde</h3><p class="sub" style="margin-top:0">Un fichier a normalement été téléchargé. Sinon, copie ce texte et conserve-le (note, mail…).</p><textarea class="et-area" id="expTxt" readonly style="min-height:120px;font-size:11px">${esc(txt)}</textarea><div class="modal-actions"><button class="btn ghost" id="mCancel">Fermer</button><button class="btn primary full" id="mCopy">Copier le texte</button></div>`;
      showModal();$('#mCancel').onclick=closeModal;$('#mCopy').onclick=()=>{const t=$('#expTxt');t.focus();t.select();try{document.execCommand('copy');}catch(_){}if(navigator.clipboard)navigator.clipboard.writeText(t.value).catch(()=>{});toast('Copié ✓');};break;}
    case 'importData':{$('#modal').innerHTML=`<div class="grip"></div><h3>Restaurer une sauvegarde</h3><p class="sub" style="margin-top:0">Choisis un fichier .json, ou colle le texte de sauvegarde ci-dessous. ⚠️ Remplace les données actuelles.</p>
      <button class="btn primary full" id="impFileBtn" style="margin-bottom:10px;background:var(--ciel-clair);color:var(--navy-3)">📁 Choisir un fichier .json</button>
      <textarea class="et-area" id="impTxt" placeholder="…ou colle ici le texte exporté" style="min-height:100px;font-size:11px"></textarea>
      <div class="modal-actions"><button class="btn ghost" id="mCancel">Annuler</button><button class="btn primary full" id="mDo">Restaurer</button></div>`;
      showModal();$('#mCancel').onclick=closeModal;
      $('#impFileBtn').onclick=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='application/json,.json';inp.onchange=()=>{const fl=inp.files[0];if(!fl)return;const r=new FileReader();r.onload=()=>{$('#impTxt').value=r.result;toast('Fichier chargé — clique Restaurer');};r.readAsText(fl);};inp.click();};
      $('#mDo').onclick=async()=>{try{const o=JSON.parse($('#impTxt').value);if(!o||!o.data)throw 0;for(const k of KEYS){if(o.data[k]!=null){DB[k]=o.data[k];await sSet(k);}}closeModal();render();toast('Données restaurées ✓');}catch(e){toast('Texte/fichier invalide');}};break;}
  }
}

/* editors */
function editSeance(date){
  const s=DB.seances[date]||{};
  const data={titre:s.titre||'Entraînement',heure:s.heure||'19:00'};
  const seqs=JSON.parse(JSON.stringify(s.seqs||[]));
  function capture(){const tt=$('#seTitre');if(tt)data.titre=tt.value;const hh=$('#seHeure');if(hh)data.heure=hh.value;
    $('#modal').querySelectorAll('[data-sq]').forEach(el=>{const p=el.dataset.sq.split(':');seqs[+p[0]][p[1]]=el.value;});}
  function build(){
    let t=data.heure;
    const rows=seqs.map((q,i)=>{const end=addMin(t,q.duree);const slot=`${(t||'').replace(':','H')} → ${end}`;t=end.replace('H',':');
      const themeOpts=th=>`<option value="">— thème —</option>`+THEMES.map(x=>`<option ${x===th?'selected':''}>${x}</option>`).join('');
      const body=q.mode==='sep'
        ? `<div class="fld" style="margin-bottom:6px"><label>Thème Équipe 1</label><select class="themesel" data-sq="${i}:theme">${themeOpts(q.theme)}</select></div>
           <div class="fld"><label>Contenu Équipe 1</label><textarea data-sq="${i}:c1" placeholder="Ex : Atelier jeu debout 7C7, 3 équipes…">${esc(q.c1||'')}</textarea></div>
           <div class="fld" style="margin-bottom:6px"><label>Thème Équipe 2</label><select class="themesel" data-sq="${i}:theme2">${themeOpts(q.theme2||q.theme)}</select></div>
           <div class="fld"><label>Contenu Équipe 2</label><textarea data-sq="${i}:c2" placeholder="Ex : Atelier jeu debout 8C8 ou 10C10…">${esc(q.c2||'')}</textarea></div>`
        : `<div class="fld" style="margin-bottom:6px"><label>Thème</label><select class="themesel" data-sq="${i}:theme">${themeOpts(q.theme)}</select></div>

    ['tempsjeu','presence','resultats'].forEach(kn=>{Object.keys(DB[kn]||{}).forEach(kk=>{const jid=kk.split(':')[1];if(jid&&!keepIds.has(jid))delete DB[kn][kk];});});
    DB.joueurs=updated;DB.settings.rosterV2627=true;
    sSet('joueurs');sSet('tempsjeu');sSet('presence');sSet('resultats');sSet('settings');
  }
  // Retrait Guichon Jeremy (suite à demande)
  if(!DB.settings.removeGuichonV1){
    const nk=s=>(s||'').toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(Boolean).sort().join('_');
    const target=nk('Guichon Jeremy');
    const victim=DB.joueurs.find(j=>nk(j.nom)===target);
    if(victim){
      DB.joueurs=DB.joueurs.filter(j=>j.id!==victim.id);
      ['tempsjeu','presence','resultats'].forEach(kn=>{Object.keys(DB[kn]||{}).forEach(kk=>{if(kk.split(':')[1]===victim.id)delete DB[kn][kk];});sSet(kn);});
      sSet('joueurs');
    }
    DB.settings.removeGuichonV1=true;sSet('settings');
  }
  let migS=false;
  Object.keys(DB.seances||{}).forEach(dt=>{const s=DB.seances[dt];if(s&&!s.seqs){s.seqs=s.contenu?[{id:uid(),theme:'',duree:0,mode:'commun',contenu:s.contenu}]:[];s.heure=s.heure||'19:00';delete s.contenu;migS=true;}});
  if(migS)sSet('seances');
  if(mig)sSet('content');
  $('#editLock').onclick=toggleEditLock;
  renderNav();render();
})();
function askEditPin(){
  $('#modal').innerHTML=`<div class="grip"></div><h3>Mode édition (staff)</h3>
    <p class="sub" style="margin-top:0">Connecté en tant que <b>${esc(fbUser&&fbUser.email||'')}</b>. Saisis le code staff pour activer l'édition.</p>
    <input class="pin-in" id="editPinIn" type="password" inputmode="numeric" maxlength="6" placeholder="••••••" style="color:var(--ink);border-color:var(--ligne);background:#fff">
    <div class="modal-actions">
      <button class="btn ghost" id="mLogout" style="color:var(--rouge)">Déconnexion Google</button>
      <button class="btn ghost" id="mCancel">Annuler</button>
      <button class="btn primary full" id="mOk">Déverrouiller</button>
    </div>`;
  showModal();$('#mCancel').onclick=closeModal;
  $('#mLogout').onclick=()=>{closeModal();signOutFb();};
  $('#mOk').onclick=()=>{const v=$('#editPinIn').value;if(v===(DB.settings.editPin||'192837')){editUnlocked=true;closeModal();render();toast('Édition activée ✓');}else toast('Code incorrect');};
  $('#editPinIn').focus();
}
async function toggleEditLock(){
  if(editUnlocked){editUnlocked=false;render();toast('Verrouillé — lecture seule');return;}
  if(!fbReady){toast('⚠️ Connexion en cours…');return;}
  if(!fbAuthed){
    await signInGoogle();
    if(!fbAuthed)return;
  }
  askEditPin();
}
</script>
